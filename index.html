<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار التوعية بقضية الأسرى الفلسطينيين</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 850px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #1a5d1a;
            border-bottom: 4px solid #e74c3c;
            padding-bottom: 15px;
        }
        .intro-text {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .question {
            margin-bottom: 25px;
            padding: 20px;
            border-right: 6px solid #27ae60;
            background: #fdfdfd;
            border-radius: 8px;
        }
        .question p {
            font-weight: bold;
        }
        .options {
            list-style: none;
            padding: 0;
        }
        .options li {
            margin: 10px 0;
            padding: 12px;
            background: #f1f1f1;
            border-radius: 8px;
            cursor: pointer;
        }
        .options li:hover {
            background: #e1e1e1;
        }
        .options input {
            margin-left: 10px;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }
        button:hover {
            background: #c0392b;
        }
        #result {
            margin-top: 20px;
            padding: 20px;
            text-align: center;
            font-size: 20px;
            display: none;
            border-radius: 10px;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #888;
        }
        .tech-club {
            color: #0056b3;
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🇵🇸 اختبار التوعية بقضية الأسرى</h1>
    <p class="intro-text">شارك في الاختبار لتعزيز معرفتك بقضية أسرى الحرية</p>

    <form id="quizForm"></form>

    <div id="result"></div>

    <div class="footer">
        <div>الحرية للأسرى .. المجد للوطن</div>
        <span class="tech-club">النادي التكنولوجي - الكلية الجامعية للعلوم التطبيقية</span>
    </div>
</div>

<script>
let questions = [
["ما الهدف من التوعية الطلابية بقضية الأسرى؟",
["الترفيه",0],["زيادة الوعي والمسؤولية المجتمعية",1],["إضاعة الوقت",0],["تقليل الدراسة",0]],

["أي من التالي يُعتبر وسيلة لنقل قضية الأسرى إلى العالم؟",
["الصمت",0],["نشر القصص والتقارير",1],["تجاهل القضية",0],["إخفاء المعلومات",0]],

["ما الفرق الأساسي بين الأسير والمعتقل الإداري؟",
["لا يوجد فرق",0],["الإداري لا يُقدم للمحاكمة",1],["الأسير لا يُحاكم",0],["الإداري يُحاكم أكثر",0]],

["أي من التالي يُعتبر سمة أساسية للاعتقال الإداري؟",
["وجود حكم قضائي نهائي",0],["تحديد مدة ثابتة",0],["إمكانية التجديد بدون محاكمة",1],["وجود هيئة محلفين",0]],

["أي من الفئات التالية شهدت حالات اعتقال؟",
["الأطفال",0],["النساء",0],["كبار السن",0],["جميع ما سبق",1]],

["أي من التالي يُستخدم لوصف عزل الأسير؟",
["الاعتقال المفتوح",0],["العزل الانفرادي",1],["الحرية المؤقتة",0],["النقل الجماعي",0]],

["أي من التالي يُعد من وسائل احتجاج الأسرى؟",
["السفر",0],["الإضراب عن الطعام",1],["الدراسة فقط",0],["الترفيه",0]],

["ما اسم الهيئة الفلسطينية المختصة بشؤون الأسرى؟",
["وزارة التعليم",0],["هيئة شؤون الأسرى والمحررين",1],["وزارة السياحة",0],["وزارة النقل",0]],

["أي جهة قانونية دولية تُعنى بحماية حقوق الأسرى؟",
["منظمة التجارة العالمية",0],["اتفاقيات جنيف",1],["اليونسكو",0],["البنك الدولي",0]],

["متى يُحيي الفلسطينيون يوم الأسير؟",
["1 يناير",0],["17 أبريل",1],["15 مايو",0],["10 ديسمبر",0]],

["ما المقصود بالاعتقال الإداري؟",
["سجن بعد محاكمة",0],["بدون تهمة أو محاكمة",1],["غرامة مالية",0],["عقوبة دراسية",0]]
];

let form = document.getElementById("quizForm");

questions.forEach((q, i) => {
    let div = document.createElement("div");
    div.className = "question";

    div.innerHTML = `<p>${i+1}. ${q[0]}</p>`;

    let ul = document.createElement("ul");
    ul.className = "options";

    for(let j=1; j<q.length; j++){
        let li = document.createElement("li");
        li.innerHTML = `<input type="radio" name="q${i}" value="${q[j][1]}"> ${q[j][0]}`;
        li.onclick = () => li.querySelector("input").checked = true;
        ul.appendChild(li);
    }

    div.appendChild(ul);
    form.appendChild(div);
});

let btn = document.createElement("button");
btn.type = "button";
btn.innerText = "إرسال الإجابات وعرض النتيجة";
btn.onclick = checkResult;
form.appendChild(btn);

function checkResult() {
    let data = new FormData(form);
    let score = 0;
    let count = 0;

    for (let v of data.values()) {
        score += parseInt(v);
        count++;
    }

    let result = document.getElementById("result");
    result.style.display = "block";

    if(count < questions.length){
        result.innerHTML = `يرجى الإجابة على جميع الأسئلة (${count} من ${questions.length})`;
        result.style.background = "#fff3cd";
        return;
    }

    result.innerHTML = `درجتك النهائية: ${score} / ${questions.length}`;

    if(score >= 9){
        result.style.background="#d4edda";
        result.innerHTML += "<br> ممتاز! وعيك مشرف جداً.";
    } else if(score >= 6){
        result.style.background="#d1ecf1";
        result.innerHTML += "<br> جيد، لكن تحتاج قراءة أكثر.";
    } else {
        result.style.background="#f8d7da";
        result.innerHTML += "<br> راجع معلوماتك أكثر.";
    }

    result.scrollIntoView({behavior:'smooth'});
}
</script>

</body>
</html>
